---
dependency:
  name: 'galaxy'
  enabled: true
driver:
  name: 'docker'
lint: |
  set -e
  yamllint .
  ansible-lint
platforms:
  - name: 'instance-rocky'
    image: 'antmelekhin/docker-systemd:rockylinux-10'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:rw'
      - '/var/lib/containerd'
    cgroupns_mode: 'host'
    privileged: true
    pre_build_image: true
    groups:
      - 'rhel_family'
provisioner:
  name: 'ansible'
verifier:
  name: 'ansible'
